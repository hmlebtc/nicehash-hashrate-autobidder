# Umbrel docker-compose for the NiceHash Hashrate Autobidder.
#
# - `app_proxy` is Umbrel's auth + reverse-proxy sidecar (it adds Umbrel's
#   login in front of the dashboard, which has no auth of its own).
# - `web` is the NiceHash daemon + dashboard, pulled from GHCR. It listens on
#   3010 and keeps its SQLite state under /app/data (bind-mounted to Umbrel's
#   per-app persistent storage).
#
# No bitcoin/electrs/datum dependencies: NiceHash delivers the rented hashrate
# straight to your configured stratum pool, so the bidder only needs the
# NiceHash API and your pool details.
#
# Defaults to MAINNET (api2.nicehash.com) and boots in DRY-RUN, so nothing is
# bought until you enter your own credentials + pool on the dashboard Config
# tab and switch to LIVE. Credentials are intentionally blank here: these env
# values only SEED the settings on first install; after that the daemon reads
# the values you save in the dashboard (persisted in the app database), so an
# update never clobbers them.

version: "3.7"

services:
  app_proxy:
    environment:
      # Must match this compose project's web service. Umbrel uses the app dir
      # name as the project prefix -> `<dir>_web_1`.
      APP_HOST: hmlebtc-nicehash-autobidder_web_1
      APP_PORT: 3010

  web:
    # Pin the exact released version - never `:latest`, never `v`-prefixed.
    # Bump in lockstep with umbrel-app.yml `version:` on every release.
    image: ghcr.io/hmlebtc/nicehash-hashrate-autobidder:0.6.37
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      NICEHASH_HTTP_PORT: 3010
      NICEHASH_DB_PATH: /app/data/nicehash-state.db
      NICEHASH_TICK_SECONDS: "60"
      # Boots in DRY-RUN: nothing is bought until you flip to LIVE in the UI.
      NICEHASH_RUN_MODE: DRY_RUN

      # --- Marketplace target (mainnet) ---
      NICEHASH_BASE_URL: https://api2.nicehash.com
      NICEHASH_BALANCE_CURRENCY: BTC
      NICEHASH_ALGORITHM: SHA256ASICBOOST
      NICEHASH_MARKET: BTC

      # --- Strategy (BTC/EH/day prices, PH/s speeds) ---
      NICEHASH_TARGET_SPEED: "1"
      NICEHASH_OVERPAY: "0.0001"
      NICEHASH_MAX_PRICE: "0.02"
      # Network-hashprice estimate for the cost-vs-hashprice tile + P&L.
      # "mempool" (mempool.space, keyless) or "none" to disable.
      NICEHASH_HASHPRICE_SOURCE: mempool

      # --- Credentials + pool ---
      # Left blank on purpose - enter these on the dashboard Config tab. They
      # persist in the app database, so updates keep them. (To pre-seed a fresh
      # install non-interactively you may fill them here instead.)
      NICEHASH_API_KEY: ""
      NICEHASH_API_SECRET: ""
      NICEHASH_ORG_ID: ""
      NICEHASH_POOL_HOST: ""
      NICEHASH_POOL_PORT: "3333"
      NICEHASH_POOL_USER: ""
