  - https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/screenshot-2.png
  - https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/screenshot-3.png
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: hmlebtc
submission: https://github.com/hmlebtc/nicehash-hashrate-autobidder
releaseNotes: |
  v0.6.20 - dynamic cap now matches the P&L break-even.

  The dynamic cap subtracted fees as a percent of the hashprice (hashprice x
  (1 - fees)), but the P&L panel treats fees as a markup on your bid (cost = bid x
  (1 + fees)). Those disagreed. Fees are a markup, so the cap now divides them
  out: cap = hashprice / (1 + fees) - buffer, so cap x (1 + fees) = hashprice and
  it lines up with the P&L. For a 4% fee this nudges the cap up slightly (true
  break-even instead of a hair conservative).

  v0.6.19 - sparse short-window charts render visibly.

  On 30s/1m windows at a coarse tick there are only 1-2 points, and a single point
  can't draw a line, so those charts looked empty. Each series now also draws a dot
  at each point when the window is sparse, and the single-timestamp x-axis no
  longer overprints its labels. (Lower "Tick seconds" for denser short-window
  charts - a 30s window only ever holds one point at a 30s tick.)

  v0.6.18 - short chart ranges (30s/1m/5m/10m/15m).

  Adds sub-30-minute range buttons for watching the loop closely at fast tick
  rates, and the chart x-axis now shows seconds on those short windows. Heads-up:
  "m" in the range bar now means minutes (1m-30m); the month window is relabelled
  "30d". Very short windows only show as many points as ticks have happened (at a
  30s tick, the 30s/1m windows are necessarily sparse).

  v0.6.17 - 30m/1h chart ranges + price chart focuses on the action.

  The range bar gains 30m and 1h options (charts, tiles and P&L all honor them).

  The price chart's Y scale now follows the action - your bid, the marginal, and
  the binding dynamic cap - instead of being stretched by lines far above it.
  Hashprice is removed from this chart (it sits well above the action and
  duplicates the dynamic-cap line + the Hashprice tile); the hard cap and the
  wildly-swinging next-filled tier stay but no longer set the scale (shown with
  value labels, clipping at the edges). The bid/marginal band now fills the chart.

  v0.6.16 - next-tick countdown follows live "Tick seconds".

  Changing "Tick seconds" live (e.g. 60 to 30) used to leave the dashboard's
  next-decision countdown showing the old period, because it read a value captured
  at boot. The countdown now reflects the saved interval within one refresh. The
  actual bidding cadence already followed the live setting - this only fixes the
  countdown display.

  v0.6.15 - faster dashboard refresh.

  The status tiles now refresh every 3s (was 5s) and the charts every 10s (was
  30s), so a finished tick shows on the dashboard sooner. New data points are
  still produced once per control-loop tick (the "Tick seconds" setting), so lower
  that if you want the bot to act/record more often.

  v0.6.14 - hashrate chart reads in sync.

  The hashrate chart is back to a single shared axis. Now that the limit is
  correctly small (since the v0.6.12 fix), the dual axis made its value land on a
  different scale than delivered and look out of sync. Delivered now sets the
  scale and the limit/target/min-fill reference lines scale by their current
  value, so they line up with delivered - and the leftover pre-fix stale limit
  history can no longer blow up the axis (it clips at the top and ages out).

  v0.6.13 - walk-up grace period + clearer chart labels.

  New "Walk-up grace (seconds)" setting (default 180): the bidder waits until
  delivered hashrate has stayed below your minimum fill for that long before it
  starts walking the price up, so a freshly placed or just-repriced order gets
  time to attract miners before escalating (and walk-ups are paced - the timer
  resets after each raise). 0 = walk up as soon as under-filled. Walk-down is
  unaffected.

  The hashrate chart now labels each line's current value at the right edge in its
  colour, so the order limit reads its real number directly instead of off the axis.

  v0.6.12 - correct chart limit + readable delivered line.

  Fixes the hashrate chart showing a limit line of ~2-4 EH when your order's
  limit was much smaller (e.g. 0.075). The bot was treating every finished order
  in its history as still "owned" and summing all their limits into the chart;
  ownership is now restricted to the live order, so the limit reflects your actual
  order (and escrow/runway are no longer inflated). This also cuts a pile of
  redundant per-tick API calls.

  The hashrate chart now gives delivered its own left axis (autoscaled) with the
  order limit/target/fill-threshold as references on a right axis, so a
  small-but-real delivered amount is readable instead of being flattened against
  zero by the limit line.

  v0.6.11 - delivered hashrate tracks the real fill + dashboard polish.

  The dashboard showed "delivering 0.00 EH/s" for an order NiceHash clearly showed
  as filled: the myOrders/detail endpoints under-report delivered speed. The bidder
  now reads your order's own row in the public order book (the value NiceHash shows)
  and takes the larger reading, so delivered speed and a new miner count track the
  real fill. The orders table gains a Miners column.

  The "Uptime" tile now shows fill uptime - of the ticks an order was active, the %
  it was actually delivering at/above your fill threshold - instead of API
  reachability (which always read ~100%). Tile values are colour-matched to their
  chart lines (current bid/delivered amber, marginal purple, hashprice slate,
  dynamic cap green). The app icon now matches the dashboard's browser-tab favicon.

  v0.6.10 - chart stretch handle + clearer line colours.

  Each chart now has a drag handle below it to stretch it taller or shorter, and
  the reset button restores the default height. The "marginal (purple)" line is
  now actually purple so it no longer blends with the blue "next filled tier"
  line, and the hashprice line is recoloured to a neutral slate.

  v0.6.9 - live config (no restart), walk-down fix.

  Config edits now auto-save and apply live within one tick - no Umbrel restart
  for routine tuning (overpay, caps, fees, dynamic cap, target, min-fill, walk-up,
  cheap mode, refill, pool worker). Pool stratum changes re-register the pool and a
  hashprice-source change swaps the oracle. (Changing the API key/secret/org or
  base URL still needs a restart.)

  Walk-down now follows the marginal down even when the order is under-filled:
  previously a bid sitting above the marginal but delivering ~0 stayed high and
  never came down. The bidder tracks the floor (marginal + overpay) both ways -
  down when overpaying (throttled to NiceHash's down-step / 10-min rule), up when
  below it and under-filled, holding the cheaper bid while filled.

  Also adds a browser-tab icon.

  v0.6.8 - live status tiles, order balance + time remaining.

  The dynamic-cap and margin tiles now use the current hashprice (the value the
  bidder actually bids against) and your live bid, and the summary tiles refresh
  every ~5s in step with the status - so they stop showing a stale 30s-cached
  average (which made "margin to cap" read OVER cap when the bid was under it).
  "Avg hashprice" is now "Hashprice (now)".

  "Available balance" (wallet) is replaced by "Order balance" - the escrow left
  in your live order - plus a new "Time remaining" tile showing the approximate
  runway until that escrow runs out. Wallet balance still shows in the P&L panel.

  v0.6.7 - fix LIVE order rejects, clearer status.

  Fixes LIVE order creation failing with "PRICE_DATA_SCALE": a dynamic-cap bid
  carried 8 decimals while NiceHash quotes prices to 4 dp, so order prices are
  now snapped to 4 dp before being sent.

  The top "Price (current bid)" / "Delivered" tiles now reflect your live order
  (not a recently cancelled one), reading "no active order" when there is none.

  Adds a "What's happening" panel: what the bot is doing now, the action planned
  for the next tick, and a live countdown/progress bar to the next decision.

  Charts now resize reliably (drag the bottom edge), and the reset button ("reset
  zoom & size") also restores the default height.

  v0.6.6 - zoomable charts, hashprice matches Hashrate Index.

  The Hashrate and Price charts are now interactive: scroll to zoom (shift =
  vertical, alt = horizontal), drag to pan, drag the bottom edge to resize, and a
  reset button returns to the full view.

  Hashprice now divides the daily block reward by the difficulty-implied network
  hashrate (the basis Luxor's Hashrate Index uses) instead of the measured 3-day
  hashrate, so the dashboard hashprice - and the dynamic cap derived from it -
  lines up with the index instead of reading a couple percent low.

  Also removes the legacy "Edit-price deadband (%)" config knob (a sensible
  internal default is kept).

  v0.6.5 - dynamic price cap.

  The bid ceiling can now track the market. The new dynamic cap = hashprice x
  (1 - (NiceHash fee + pool fee)/100) - your profit buffer: the most you can pay
  and still keep a margin after both fees come out of the hashprice. It's a
  backstop alongside the fixed Max price (the lower of the two binds), and falls
  back to the Max price if the hashprice source is down. The buffer is an
  absolute BTC/EH/day amount (0 = pure break-even).

  The Config "Fees & break-even" section is replaced by a "Dynamic price cap"
  section (enable, NiceHash fee %, pool fee %, profit buffer); the edit-price
  deadband moves to Strategy, and the Status tiles / price-chart line become
  "Dynamic cap" / "Margin to cap".

  v0.6.4 - correct floor, single managed order, instant walk-ups.

  Floor/anchor: the order book interleaves zero-miner orders above the real
  marginal, so v0.6.3 (which stopped at the first gap) still read the anchor too
  high. The bidder now scans the whole book and anchors at the global cheapest
  order that still has miners - NiceHash's purple price.

  One order: the bot manages only the order whose pool worker matches your
  configured pool user (e.g. <address>.autobidder), keeps exactly one, and
  ignores any other order on the account (no more pausing on manual/leftover
  orders). It also re-adopts its own order after a restart.

  Walk-ups: raises are unconstrained on NiceHash, so while under-filled the bid
  climbs to the next filled tier + overpay every tick. Once filled it holds the
  cheaper bid even if the marginal rises (only walking down toward the floor,
  throttled), and resumes climbing only after it falls under-filled. The "walk-up
  settle" setting is retired.

  v0.6.3 - anchor reads the true marginal; delivered hashrate no longer 0.

  The NiceHash order book only returns the top ~100 orders by price, and in a
  liquid market all of those are already filled - so the cheapest order the bot
  could see sat well above the real marginal, and it anchored (and bid) near the
  top of the book instead of the floor. The bidder now pages through the order
  book down to where orders stop having miners, finds the genuine cheapest filled
  order, and bids just above that. Also: each of your orders' delivered speed is
  refreshed from the per-order detail endpoint (the list endpoint can report 0
  even when the order is drawing), best-effort and never blocking a tick.

  v0.6.2 - diagnostics for marginal price + delivered speed.

  Adds a read-only debug endpoint (/api/nicehash/debug/raw) that dumps the raw
  NiceHash order-book entries and your raw order objects, so the exact fields
  for the per-order miner count and delivered speed can be identified and our
  parsing corrected. Investigating two reports: the marginal/anchor reading too
  high vs the order book, and delivered hashrate showing 0 when the order is
  actually receiving some.

  v0.6.1 - smarter walk-up + clearer price chart.

  Walk-up no longer uses a fixed step: while under-filled it jumps to just above
  the next filled order on the book (the next tier with miners) + your overpay,
  climbing the fill ladder tier by tier and skipping gaps of zero-miner orders.
  The price chart now tracks your bid, the marginal floor, the next filled tier,
  hashprice, break-even, and your hard cap - with each line's current value
  labelled on the right edge. Removed the cosmetic "Minimum floor" knob; the
  hashrate chart's reference line now shows the real fill threshold
  (target x min-fill %).

  v0.6.0 - track-to-fill bidding (walk up to win, walk down to save).

  The bidder now runs a closed loop on the live order. It starts at the floor
  (cheapest order with miners + your overpay). If it isn't winning at least your
  minimum-fill % of target, it walks the bid up a step at a time - waiting a
  settle window between steps so a raise has time to attract miners - until it
  fills or hits your price/break-even cap. Once filled and sitting above the
  floor, it steps the bid back down toward it (bounded by NiceHash's once-per-10
  minutes / max-down-step rule) to reclaim margin. New "Track-to-fill" config:
  minimum fill %, walk-up step, and settle seconds. Also fixes a latent bug
  where a large downward re-price was sent in one illegal jump and rejected.

  Bundles the v0.5.4 anchor fix (marginal via miner count) and the v0.5.5 EH
  speed-unit correction.

  v0.5.5 - correct speed units (EH for Bitcoin SHA256).

  The dashboard hardcoded "PH/s" for hashrate, but SHA256ASICBOOST is quoted in
  EH/s on NiceHash. Speeds are now labelled and scaled from the market's real
  display unit (read from the algorithm's marketFactor), so the supply tile,
  delivered/limit, charts, and the Target speed / Minimum floor config fields
  all read in the correct unit. Heads-up: your "target speed" is in that unit -
  on Bitcoin a target of 2 means 2 EH/s, so set it accordingly.

  v0.5.4 - anchor off the "Miners" count, not accepted-speed.

  The order book's per-order accepted-speed field under-reports badly, so v0.5.3
  still anchored too high. The bot now uses each order's miner count (NiceHash's
  "Miners" column) to find the marginal order - the cheapest order with miners
  on it - matching the purple price. Your anchor should track ~the purple.

  v0.5.3 - anchor at the marginal price, not the top of the book.

  v0.5.1 fixed one anchor bug but introduced another: the anchor walked up the
  filled orders accumulating delivered speed until it covered your target, which
  in a deep market climbed to the most expensive filled order (~0.50) and made
  the bot bid at its price cap. The anchor is now simply the cheapest order
  currently receiving hashrate - exactly NiceHash's purple marginal - so the bot
  bids just above the floor (marginal + your overpay) and your order limit caps
  how much you draw.

  v0.5.2 - surface API errors, fail fast, snappier mode switch.

  When the bot couldn't read the order book or your orders it just logged a
  vague "market unavailable". It now reports the actual cause (e.g. an HTTP 401
  on the my-orders read) in the Logs tab and as a banner on the Status page, so
  a misconfigured API key/permission is obvious instead of looking like a dead
  app. NiceHash API calls now time out after 15s instead of hanging the loop.
  Switching DRY-RUN / PAUSE / LIVE shows an immediate "switching…" indicator.

  v0.5.1 - fix the market anchor (price to beat).

  The "Market anchor" was computed from each competing order's price *cap*
  (limit), so a single idle high-priced order with a large cap but ~no actual
  hashrate could drag the anchor far above the real market - e.g. showing ~0.50
  when NiceHash's marginal (purple) price was ~0.44. The anchor is now derived
  from the speed each order is *actually* receiving, so it matches NiceHash's
  purple marginal: the cheapest order still being filled. Bids now sit just
  above that floor instead of overpaying toward the safety cap.

  v0.5.0 - Logs tab, connectivity tests, and a master fees switch.

  New Logs tab: one row per control-loop tick (what it decided and why, plus
  holds, blocks, pauses) and an error row for any failed tick, with an
  info/warn/error filter and a configurable retention window (15/30/60/90 days).

  Test connection now checks all four dependencies independently - the NiceHash
  API, your pool (TCP reachability), the hashprice source, and the BTC price
  source - and reports each result on its own row, so one missing piece never
  hides the rest.

  Fixes a bug where old Stopped/Completed NiceHash orders were treated as
  "unknown" and forced the bot to PAUSE: only live orders count now, so the
  bidder can create orders again. The fees & break-even section gains a master
  "Use fees & break-even in calculations" switch and now holds the edit-price
  deadband.

  v0.4.0 - configurable fees + fee-adjusted break-even.

  Adds NiceHash-fee and pool-fee percentage fields. From them the bot computes
  your break-even = hashprice / (1 + (NiceHash fee + pool fee)/100): the most
  you can bid per EH/day and still cover the bid plus both fees out of the
  hashprice. The Status page shows a Break-even tile, a Margin-to-break-even
  tile, and a break-even line on the price chart, and the profit & loss panel is
  now fee-aware. With "Cap bids at break-even" on (default), the bot never bids
  above break-even - so it only rents hashrate that should pay for itself.

  Also: mainnet by default with blank credentials, the Hashrate Autopilot
  colour theme, and inline help on every Config field.

  Ships pointed at the NiceHash mainnet API by default with blank credentials -
  enter your own API key/secret/org and pool on the Config tab (they persist in
  the app database, so updates keep them). The dashboard is re-themed to the
  Hashrate Autopilot palette, and every Config field now has an inline
  description. Clarified that "minimum floor" is a hashrate reference line, not
  a price - the price floor you outbid (the marginal order shown purple in
  NiceHash's order book) is the live market anchor, tracked automatically.

  v0.3.0 - full dashboard: charts, history, profit & loss.

  The dashboard is now a tabbed Status / History / Config app. Status adds a
  "Run decision now" button with a next-tick countdown, hero cards, a
  time-range selector, summary tiles (uptime, average price, cost vs hashprice),
  hashrate + price charts (the price chart marks create/edit/cancel events), the
  orders table, and a profit & loss panel. History is the full order-mutation
  audit trail with filters. Config gains minimum floor, cheap mode, the dynamic
  hashprice cap, the edit-price deadband, boot mode, and history retention.

  A network-hashprice estimate (opt-in, mempool.space) powers the cost-vs-
  hashprice tile and the estimated income/net figures. Header toggles switch
  speed (TH/PH/EH) and price (sat/BTC) units. The daemon persists a per-tick
  metrics series + the order-event log behind it all.
