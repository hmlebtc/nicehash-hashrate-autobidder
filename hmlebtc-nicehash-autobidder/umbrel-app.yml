releaseNotes: |
  v0.6.2 - diagnostics for marginal price + delivered speed.

  Adds a read-only debug endpoint (/api/nicehash/debug/raw) that dumps the raw
  NiceHash order-book entries and your raw order objects, so the exact fields
  for the per-order miner count and delivered speed can be identified and our
  parsing corrected. Investigating two reports: the marginal/anchor reading too
  high vs the order book, and delivered hashrate showing 0 when the order is
  actually receiving some.

  v0.6.1 - smarter walk-up + clearer price chart.

  Walk-up no longer uses a fixed step: while under-filled it jumps to just above
  the next filled order on the book (the next tier with miners) + your overpay,
  climbing the fill ladder tier by tier and skipping gaps of zero-miner orders.
  The price chart now tracks your bid, the marginal floor, the next filled tier,
  hashprice, break-even, and your hard cap - with each line's current value
  labelled on the right edge. Removed the cosmetic "Minimum floor" knob; the
  hashrate chart's reference line now shows the real fill threshold
  (target x min-fill %).

  v0.6.0 - track-to-fill bidding (walk up to win, walk down to save).

  The bidder now runs a closed loop on the live order. It starts at the floor
  (cheapest order with miners + your overpay). If it isn't winning at least your
  minimum-fill % of target, it walks the bid up a step at a time - waiting a
  settle window between steps so a raise has time to attract miners - until it
  fills or hits your price/break-even cap. Once filled and sitting above the
  floor, it steps the bid back down toward it (bounded by NiceHash's once-per-10
  minutes / max-down-step rule) to reclaim margin. New "Track-to-fill" config:
  minimum fill %, walk-up step, and settle seconds. Also fixes a latent bug
  where a large downward re-price was sent in one illegal jump and rejected.

  Bundles the v0.5.4 anchor fix (marginal via miner count) and the v0.5.5 EH
  speed-unit correction.

  v0.5.5 - correct speed units (EH for Bitcoin SHA256).

  The dashboard hardcoded "PH/s" for hashrate, but SHA256ASICBOOST is quoted in
  EH/s on NiceHash. Speeds are now labelled and scaled from the market's real
  display unit (read from the algorithm's marketFactor), so the supply tile,
  delivered/limit, charts, and the Target speed / Minimum floor config fields
  all read in the correct unit. Heads-up: your "target speed" is in that unit -
  on Bitcoin a target of 2 means 2 EH/s, so set it accordingly.

  v0.5.4 - anchor off the "Miners" count, not accepted-speed.

  The order book's per-order accepted-speed field under-reports badly, so v0.5.3
  still anchored too high. The bot now uses each order's miner count (NiceHash's
  "Miners" column) to find the marginal order - the cheapest order with miners
  on it - matching the purple price. Your anchor should track ~the purple.

  v0.5.3 - anchor at the marginal price, not the top of the book.

  v0.5.1 fixed one anchor bug but introduced another: the anchor walked up the
  filled orders accumulating delivered speed until it covered your target, which
  in a deep market climbed to the most expensive filled order (~0.50) and made
  the bot bid at its price cap. The anchor is now simply the cheapest order
  currently receiving hashrate - exactly NiceHash's purple marginal - so the bot
  bids just above the floor (marginal + your overpay) and your order limit caps
  how much you draw.

  v0.5.2 - surface API errors, fail fast, snappier mode switch.

  When the bot couldn't read the order book or your orders it just logged a
  vague "market unavailable". It now reports the actual cause (e.g. an HTTP 401
  on the my-orders read) in the Logs tab and as a banner on the Status page, so
  a misconfigured API key/permission is obvious instead of looking like a dead
  app. NiceHash API calls now time out after 15s instead of hanging the loop.
  Switching DRY-RUN / PAUSE / LIVE shows an immediate "switching…" indicator.

  v0.5.1 - fix the market anchor (price to beat).

  The "Market anchor" was computed from each competing order's price *cap*
  (limit), so a single idle high-priced order with a large cap but ~no actual
  hashrate could drag the anchor far above the real market - e.g. showing ~0.50
  when NiceHash's marginal (purple) price was ~0.44. The anchor is now derived
  from the speed each order is *actually* receiving, so it matches NiceHash's
  purple marginal: the cheapest order still being filled. Bids now sit just
  above that floor instead of overpaying toward the safety cap.

  v0.5.0 - Logs tab, connectivity tests, and a master fees switch.

  New Logs tab: one row per control-loop tick (what it decided and why, plus
  holds, blocks, pauses) and an error row for any failed tick, with an
  info/warn/error filter and a configurable retention window (15/30/60/90 days).

  Test connection now checks all four dependencies independently - the NiceHash
  API, your pool (TCP reachability), the hashprice source, and the BTC price
  source - and reports each result on its own row, so one missing piece never
  hides the rest.

  Fixes a bug where old Stopped/Completed NiceHash orders were treated as
  "unknown" and forced the bot to PAUSE: only live orders count now, so the
  bidder can create orders again. The fees & break-even section gains a master
  "Use fees & break-even in calculations" switch and now holds the edit-price
  deadband.

  v0.4.0 - configurable fees + fee-adjusted break-even.

  Adds NiceHash-fee and pool-fee percentage fields. From them the bot computes
  your break-even = hashprice / (1 + (NiceHash fee + pool fee)/100): the most
  you can bid per EH/day and still cover the bid plus both fees out of the
  hashprice. The Status page shows a Break-even tile, a Margin-to-break-even
  tile, and a break-even line on the price chart, and the profit & loss panel is
  now fee-aware. With "Cap bids at break-even" on (default), the bot never bids
  above break-even - so it only rents hashrate that should pay for itself.

  Also: mainnet by default with blank credentials, the Hashrate Autopilot
  colour theme, and inline help on every Config field.

  Ships pointed at the NiceHash mainnet API by default with blank credentials -
  enter your own API key/secret/org and pool on the Config tab (they persist in
  the app database, so updates keep them). The dashboard is re-themed to the
  Hashrate Autopilot palette, and every Config field now has an inline
  description. Clarified that "minimum floor" is a hashrate reference line, not
  a price - the price floor you outbid (the marginal order shown purple in
  NiceHash's order book) is the live market anchor, tracked automatically.

  v0.3.0 - full dashboard: charts, history, profit & loss.

  The dashboard is now a tabbed Status / History / Config app. Status adds a
  "Run decision now" button with a next-tick countdown, hero cards, a
  time-range selector, summary tiles (uptime, average price, cost vs hashprice),
  hashrate + price charts (the price chart marks create/edit/cancel events), the
  orders table, and a profit & loss panel. History is the full order-mutation
  audit trail with filters. Config gains minimum floor, cheap mode, the dynamic
  hashprice cap, the edit-price deadband, boot mode, and history retention.

  A network-hashprice estimate (opt-in, mempool.space) powers the cost-vs-
  hashprice tile and the estimated income/net figures. Header toggles switch
  speed (TH/PH/EH) and price (sat/BTC) units. The daemon persists a per-tick
  metrics series + the order-event log behind it all.
