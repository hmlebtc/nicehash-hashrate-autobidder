# Umbrel app manifest. Loaded when this repo is added as a Community App
# Store. The directory name and the `id` below must be prefixed with the
# store id from umbrel-app-store.yml (`hmlebtc-`).

manifestVersion: 1
id: hmlebtc-nicehash-autobidder
category: bitcoin
name: NiceHash Hashrate Autobidder
version: "0.4.0"
tagline: Automatically rent NiceHash hash-power and point it at your pool
icon: https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/icon-512.png
# Umbrel renders the description literally - each paragraph is one physical
# line, blank line between paragraphs. Do not soft-wrap.
description: |
  Rent hashrate on the NiceHash Hash-power marketplace and route it to your own mining pool, automatically. Each tick the autobidder reads the live order book, works out the marginal price needed to win your target hashrate, adds a small operator-chosen cushion, and keeps a single STANDARD order tracking that price - topping the order up (refill) before its escrow runs dry. You set a maximum price you are willing to pay and the controller never goes above it.

  It boots in DRY-RUN: it shows you exactly what it would do (create / re-price / refill / cancel) without spending anything. Flip to LIVE from the dashboard when you are ready, and back to DRY-RUN or PAUSED any time.

  The dashboard (port 3010) shows your balance, the live market anchor and supply, your order with its price / speed / delivered hashrate / escrow runway, and the controller's next action with the reason behind it. An unknown-order safeguard pauses the bidder if it sees an order on the account it did not create.

  Pricing is in BTC per EH per day and speed in PH/s, matching NiceHash. Point it at any stratum pool; the app registers the pool with NiceHash for you. Defaults target SHA256AsicBoost.

  This is a community fork of Hashrate Autopilot (MIT, Remco Douma), adapted for NiceHash. Not affiliated with NiceHash Ltd. It automates real trades with real funds - you are responsible for your API keys, spend, and local compliance.
developer: hmlebtc
website: https://github.com/hmlebtc/nicehash-hashrate-autobidder
repo: https://github.com/hmlebtc/nicehash-hashrate-autobidder
support: https://github.com/hmlebtc/nicehash-hashrate-autobidder/issues
# Host port Umbrel publishes the app on - must be unique across all
# installed apps. NOT 3010: upstream Hashrate Autopilot (rdouma) already
# uses 3010, so installing both would collide. The daemon still listens on
# 3010 inside the container (docker-compose APP_PORT / NICEHASH_HTTP_PORT);
# only this host-facing port is moved.
port: 7910
gallery:
  - https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/screenshot-1.png
  - https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/screenshot-2.png
  - https://raw.githubusercontent.com/hmlebtc/nicehash-hashrate-autobidder/main/assets/screenshot-3.png
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: hmlebtc
submission: https://github.com/hmlebtc/nicehash-hashrate-autobidder
releaseNotes: |
  v0.4.0 - configurable fees + fee-adjusted break-even.

  Adds NiceHash-fee and pool-fee percentage fields. From them the bot computes
  your break-even = hashprice / (1 + (NiceHash fee + pool fee)/100): the most
  you can bid per EH/day and still cover the bid plus both fees out of the
  hashprice. The Status page shows a Break-even tile, a Margin-to-break-even
  tile, and a break-even line on the price chart, and the profit & loss panel is
  now fee-aware. With "Cap bids at break-even" on (default), the bot never bids
  above break-even - so it only rents hashrate that should pay for itself.

  Also: mainnet by default with blank credentials, the Hashrate Autopilot
  colour theme, and inline help on every Config field.

  Ships pointed at the NiceHash mainnet API by default with blank credentials -
  enter your own API key/secret/org and pool on the Config tab (they persist in
  the app database, so updates keep them). The dashboard is re-themed to the
  Hashrate Autopilot palette, and every Config field now has an inline
  description. Clarified that "minimum floor" is a hashrate reference line, not
  a price - the price floor you outbid (the marginal order shown purple in
  NiceHash's order book) is the live market anchor, tracked automatically.

  v0.3.0 - full dashboard: charts, history, profit & loss.

  The dashboard is now a tabbed Status / History / Config app. Status adds a
  "Run decision now" button with a next-tick countdown, hero cards, a
  time-range selector, summary tiles (uptime, average price, cost vs hashprice),
  hashrate + price charts (the price chart marks create/edit/cancel events), the
  orders table, and a profit & loss panel. History is the full order-mutation
  audit trail with filters. Config gains minimum floor, cheap mode, the dynamic
  hashprice cap, the edit-price deadband, boot mode, and history retention.

  A network-hashprice estimate (opt-in, mempool.space) powers the cost-vs-
  hashprice tile and the estimated income/net figures. Header toggles switch
  speed (TH/PH/EH) and price (sat/BTC) units. The daemon persists a per-tick
  metrics series + the order-event log behind it all.
