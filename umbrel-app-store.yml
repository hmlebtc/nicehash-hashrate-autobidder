# Umbrel Community App Store manifest. Lives at the repo root because
# Umbrel's "Add App Store" flow expects this file there.
#
# Operators add this store to their Umbrel via:
#   Settings → App Stores → Add App Store
#   → https://github.com/hmlebtc/nicehash-hashrate-autobidder
# Umbrel then walks each top-level directory of this repo looking for
# umbrel-app.yml manifests. The app dir name must be prefixed with the
# `id` below - here that's `hmlebtc-nicehash-autobidder/`.

id: hmlebtc
# Umbrel renders this as "<name> App Store".
name: NiceHash Hashrate Autobidder
tagline: Automated NiceHash hash-power bidding for your own pool
